buildscript {
    repositories {
        maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
        mavenCentral()
    }
    dependencies {
        classpath 'org.spongepowered:mixingradle:0.7-SNAPSHOT'
    }
}

plugins {
    id 'eclipse'
    id 'idea'
    id 'net.minecraftforge.gradle' version '[6.0.16,6.2)'
}

def javaVer = 8

apply plugin: 'org.spongepowered.mixin'

group = mod_group_id
version = mod_version

base {
    archivesName = mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(javaVer)
}

minecraft {
    mappings channel: mapping_channel, version: minecraft_version

    copyIdeResources = true

    runs {
        configureEach {
            workingDirectory project.file('run')

            property 'forge.logging.markers', 'REGISTRIES'

            property 'forge.logging.console.level', 'debug'

            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        client {}

        server {
            // args '--nogui'
        }

        data {
            workingDirectory project.file('run-data')

            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

mixin {
    add sourceSets.main, "${mod_id}.refmap.json"

    config "${mod_id}.mixins.json"
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

// region banira_codex：JarJar / 胖 JAR 合并
def baniraArtifactVersionRange = "${banira_version_range}"
def baniraCodexCoords = "xin.vanilla.banira:banira_codex:${loader_type}-${minecraft_version}-${banira_version}"

// 仓库中的 banira_codex（与 Banira 工程 publish + reobfJar 产物一致，SRG），用于胖包 zip 合并；勿用 fg.deobf
configurations {
    baniraCodexObf {
        canBeConsumed = false
        canBeResolved = true
        transitive = false
    }
}
// endregion banira_codex

repositories {
    flatDir {
        dir 'libs'
    }
    maven { name "CurseMaven"; url "https://cursemaven.com" }
    mavenLocal()
    // IE
    maven { name = "BlameJared"; url = "https://maven.blamejared.com/" }
    // JEI
    maven { name = "DVS1 Maven FS"; url = "https://dvs1.progwml6.com/files/maven" }
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'

    testImplementation 'junit:junit:4.13.2'

    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'
    testCompileOnly 'org.projectlombok:lombok:1.18.34'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.34'

    implementation fg.deobf(baniraCodexCoords)
    baniraCodexObf baniraCodexCoords
    // jarJar("xin.vanilla.banira:banira_codex:${loader_type}-${minecraft_version}-${banira_version}") {
    //     jarJar.ranged(it, baniraArtifactVersionRange)
    // }

    // JEI
    runtimeOnly fg.deobf("mezz.jei:jei-${minecraft_version}:${jei_version}")
    // AE
    runtimeOnly fg.deobf("blank:appliedenergistics2:8.4.7")
    // IE
    runtimeOnly fg.deobf("blusunrize.immersiveengineering:ImmersiveEngineering:${ie_version}")

    // Narcissus
    compileOnly "curse.maven:narcissus-farewell-1210871:${narcissus_maven_id}"
    // compileOnly fg.deobf("blank:narcissus_farewell:forge-1.16.5-2.0.0.dev2")
    // runtimeOnly fg.deobf("blank:narcissus_farewell:forge-1.16.5-2.0.0.dev2")

}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [minecraft_version   : minecraft_version, minecraft_version_range: minecraft_version_range,
                             forge_version       : forge_version, forge_version_range: forge_version_range,
                             loader_version_range: loader_version_range,
                             loader_type         : loader_type,
                             banira_version_range: banira_version_range,
                             mod_id              : mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
                             mod_authors         : mod_authors, mod_description: mod_description,]

    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

// 仅用于 jarAll：从瘦资源复制并追加 banira_codex 的 [[mods]]（瘦 jar 的 mods.toml 不追加）
tasks.register('prepareFatResources') {
    dependsOn 'processResources'
    inputs.dir(layout.buildDirectory.dir('resources/main'))
    inputs.property('banira_embed_mods_toml', "${banira_version}|${minecraft_version}|${forge_version_range}|${minecraft_version_range}")
    outputs.dir(layout.buildDirectory.dir('fatResources/main'))
    doLast {
        copy {
            from layout.buildDirectory.dir('resources/main')
            into layout.buildDirectory.dir('fatResources/main')
        }
        def modsToml = layout.buildDirectory.file('fatResources/main/META-INF/mods.toml').get().asFile
        if (!modsToml.isFile()) {
            throw new GradleException('fatResources: META-INF/mods.toml missing')
        }
        modsToml.append("""
[[mods]]
    modId = "banira_codex"
    version = "${banira_version}"
    displayName = "香草志(Banira Codex)"
    updateJSONURL = "https://update.mc.vanilla.xin/banira_codex/forge/${minecraft_version}"
    displayURL = "https://mc.vanilla.xin/banira_codex"
    authors = "Tsuki Maaii"
    description = ''''''
    clientRequired = false
[[dependencies."banira_codex"]]
    modId = "forge"
    mandatory = true
    versionRange = "${forge_version_range}"
    ordering = "NONE"
    side = "BOTH"
[[dependencies."banira_codex"]]
    modId = "minecraft"
    mandatory = true
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"
[[dependencies."banira_codex"]]
    modId = "banira_codex"
    mandatory = true
    versionRange = "[1.0.0,)"
    ordering = "NONE"
    side = "SERVER"
[[dependencies."banira_codex"]]
    modId = "banira_codex"
    mandatory = false
    versionRange = "[1.0.0,)"
    ordering = "NONE"
    side = "CLIENT"
""".stripIndent(), 'UTF-8')
    }
}

def modsJarVersion = "${loader_type}-${minecraft_version}-${mod_version}"
def modsDestinationDir = file("${projectDir}/builds/${mod_version}")

tasks.named('jar', Jar).configure {
    // 瘦 JAR：不含 banira_codex 字节与资源
    archiveBaseName.set(mod_id)
    archiveVersion.set(modsJarVersion)
    destinationDirectory.set(modsDestinationDir)

    manifest {
        attributes(["Specification-Title"     : mod_id,
                    "Specification-Vendor"    : mod_authors,
                    "Specification-Version"   : "1",
                    "Implementation-Title"    : project.name,
                    "Implementation-Version"  : project.jar.archiveVersion,
                    "Implementation-Vendor"   : mod_authors,
                    "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")])
    }

    finalizedBy 'reobfJar'
}

// 胖 JAR：reobf 后的瘦包（SRG）+ 仓库中已 reobf 的 banira_codex（SRG）+ 追加 mods.toml；不再对合并结果跑第二次 reobf（MCP 混包会导致 remapper NPE）
tasks.register('jarAll', Jar) {
    archiveBaseName.set(mod_id)
    archiveVersion.set(modsJarVersion)
    archiveClassifier.set('all')
    destinationDirectory.set(modsDestinationDir)

    dependsOn 'reobfJar', 'prepareFatResources', configurations.named('baniraCodexObf')
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    def slimJar = tasks.named('jar', Jar)

    from {
        zipTree(slimJar.get().archiveFile.get().asFile)
    } {
        exclude 'META-INF/mods.toml'
        exclude 'META-INF/MANIFEST.MF'
        exclude 'META-INF/*.SF'
        exclude 'META-INF/*.RSA'
        exclude 'META-INF/*.DSA'
    }
    from(layout.buildDirectory.file('fatResources/main/META-INF/mods.toml')) {
        into 'META-INF'
    }
    from {
        zipTree(configurations.baniraCodexObf.singleFile)
    } {
        exclude 'META-INF/mods.toml'
        exclude 'META-INF/MANIFEST.MF'
        exclude 'META-INF/*.SF'
        exclude 'META-INF/*.RSA'
        exclude 'META-INF/*.DSA'
    }

    manifest {
        attributes(["Specification-Title"     : mod_id,
                    "Specification-Vendor"    : mod_authors,
                    "Specification-Version"   : "1",
                    "Implementation-Title"    : project.name,
                    "Implementation-Version"  : "${modsJarVersion}-all",
                    "Implementation-Vendor"   : mod_authors,
                    "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")])
    }
}

tasks.named('assemble').configure {
    dependsOn 'jarAll'
}

afterEvaluate {
    tasks.named('jar', Jar).configure {
        manifest.attributes('MixinConfigs': "${mod_id}.mixins.json")
    }
    tasks.named('jarAll', Jar).configure {
        manifest.attributes(
                'MixinConfigs': "${mod_id}.mixins.json, banira_codex.mixins.json"
        )
    }
}

