
#进度条与竹叶/竹竿/文字显示
#Progress bar (bamboo leaf / pole / text)
[progressBar]
	#进度条快捷键：false 按住，true 切换
	#Key mode: false = hold, true = toggle
	progressBarKeyApplyMode = false
	#正常状态下进度条显示方式（LEAF/POLE/TEXT）
	#Progress bar modes when idle (LEAF / POLE / TEXT)
	progressBarDisplayNormal = ["LEAF"]
	#按住按键时进度条显示方式
	#Progress bar modes while holding the key
	progressBarDisplayHold = ["LEAF", "POLE", "TEXT"]

	#文字
	#Text overlay
	[progressBar.text]
		#绘制倒计时文字时是否隐藏经验条。
		#Hide the XP bar while drawing countdown text.
		hideExperienceBarText = true
		#文字相对竹竿定位所用的屏幕象限（1–4）。
		#Screen quadrant for text placement relative to the pole.
		#Range: 1 ~ 4
		progressBarTextScreenQuadrant = 1
		#文字旋转角度（0–360）。
		#Text rotation in degrees (0–360).
		#Range: 0.0 ~ 360.0
		progressBarTextAngle = 0.0
		#文字大小（相对 16px 基准缩放）。
		#Font size scale relative to 16px base.
		#Range: 1 ~ 256
		progressBarTextSize = 8
		#参考点相对竹竿的偏移（x,y 或 x%,y%，象限含义与竹竿一致）。文字再按水平/垂直对齐相对该点对齐。
		#Anchor offset from pole (x,y or x%,y%). Text aligns to this point per horizontal/vertical align.
		progressBarTextPosition = "50%,8"
		#相对参考点的垂直对齐：TOP/CENTER/BOTTOM。
		#Vertical align to anchor: TOP / CENTER / BOTTOM.
		#Allowed Values: TOP, CENTER, BOTTOM
		progressBarTextAlignV = "TOP"
		#相对参考点的水平对齐：LEFT/CENTER/RIGHT。
		#Horizontal align to anchor: LEFT / CENTER / RIGHT.
		#Allowed Values: LEFT, CENTER, RIGHT
		progressBarTextAlignH = "CENTER"
		#文字颜色。支持十六进制（0xAARRGGBB、#RRGGBB 等）或十进制 R,G,B / A,R,G,B。
		#Text color: hex (0xAARRGGBB, #RRGGBB, …) or decimal R,G,B / A,R,G,B.
		progressBarTextColor = "0x5DA530"

	#竹叶
	#Bamboo leaf
	[progressBar.leaf]
		#竹叶显示高度（像素）。
		#Leaf draw height in pixels.
		#Range: > 1
		progressBarLeafHeight = 10
		#竹叶显示宽度（像素）。
		#Leaf draw width in pixels.
		#Range: > 1
		progressBarLeafWidth = 9
		#竹叶旋转角度（0–360）。
		#Leaf rotation in degrees (0–360).
		#Range: 0.0 ~ 360.0
		progressBarLeafAngle = 0.0
		#绘制竹叶时是否隐藏经验条。
		#Hide the XP bar while drawing the bamboo leaf.
		hideExperienceBarLeaf = false
		#竹叶纹理锚点：TOP_LEFT/TOP_RIGHT/TOP_CENTER/BOTTOM_LEFT/BOTTOM_RIGHT/BOTTOM_CENTER/CENTER（与 EnumPosition 一致）。
		#Texture anchor for the leaf (EnumPosition names, e.g. TOP_LEFT, CENTER).
		#Allowed Values: TOP_LEFT, TOP_RIGHT, TOP_CENTER, LEFT_CENTER, RIGHT_CENTER, BOTTOM_LEFT, BOTTOM_RIGHT, BOTTOM_CENTER, CENTER
		progressBarLeafBase = "TOP_LEFT"
		#屏幕坐标象限：1 左下(↑→)；2 右下(↑←)；3 右上(↓←)；4 左上(↓→)。
		#Screen quadrant: 1 bottom-left; 2 bottom-right; 3 top-right; 4 top-left.
		#Range: 1 ~ 4
		progressBarLeafScreenQuadrant = 1
		#竹叶相对竹竿的偏移。x,y 为绝对坐标；x%,y% 为相对坐标（象限为 4 时，0,0 表示竹竿左上角）。
		#Leaf position vs pole: x,y absolute; x%,y% relative (quadrant 4: 0,0 = pole top-left).
		progressBarLeafPosition = "0,4"

	#竹竿
	#Bamboo pole
	[progressBar.pole]
		#屏幕坐标象限：1 左下；2 右下；3 右上；4 左上（与竹叶说明相同）。
		#Screen quadrant for pole placement (same meaning as leaf quadrant).
		#Range: 1 ~ 4
		progressBarPoleScreenQuadrant = 1
		#竹竿显示宽度（像素）。
		#Pole draw width in pixels.
		#Range: > 1
		progressBarPoleWidth = 180
		#竹竿显示高度（像素）。
		#Pole draw height in pixels.
		#Range: > 1
		progressBarPoleHeight = 5
		#竹竿纹理锚点（EnumPosition）。
		#Texture anchor for the pole (EnumPosition).
		#Allowed Values: TOP_LEFT, TOP_RIGHT, TOP_CENTER, LEFT_CENTER, RIGHT_CENTER, BOTTOM_LEFT, BOTTOM_RIGHT, BOTTOM_CENTER, CENTER
		progressBarPoleBase = "TOP_CENTER"
		#竹竿在屏幕上的位置。x,y 绝对坐标；x%,y% 相对坐标（象限 4 时 0%,0% 为屏幕左上角）。
		#Pole position: x,y absolute; x%,y% relative (quadrant 4: 0%,0% = screen top-left).
		progressBarPolePosition = "50%,29"
		#绘制竹竿时是否隐藏经验条。
		#Hide the XP bar while drawing the bamboo pole.
		hideExperienceBarPole = true
		#竹竿旋转角度（0–360）。
		#Pole rotation in degrees (0–360).
		#Range: 0.0 ~ 360.0
		progressBarPoleAngle = 0.0

#垃圾箱界面
#Dustbin screen
[dustbin]
	#垃圾箱界面：VANILLA 原版；TEXTURED 自定义纹理；BANIRA_THEME 使用主题色纯色绘制。
	#Dustbin UI: VANILLA; TEXTURED; BANIRA_THEME.
	#Allowed Values: VANILLA, TEXTURED, BANIRA_THEME
	dustbinUiStyle = "TEXTURED"

